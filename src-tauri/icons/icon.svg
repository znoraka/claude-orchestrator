<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e07a5f"/>
      <stop offset="100%" style="stop-color:#d4603a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Terminal window frame -->
  <rect x="64" y="88" width="384" height="312" rx="16" ry="16" fill="#0d1117" stroke="#30363d" stroke-width="4"/>

  <!-- Title bar -->
  <rect x="64" y="88" width="384" height="40" rx="16" ry="16" fill="#161b22"/>
  <rect x="64" y="112" width="384" height="16" fill="#161b22"/>

  <!-- Window buttons -->
  <circle cx="96" cy="108" r="8" fill="#f85149"/>
  <circle cx="120" cy="108" r="8" fill="#f0c541"/>
  <circle cx="144" cy="108" r="8" fill="#56d364"/>

  <!-- Prompt line 1: active -->
  <text x="88" y="170" font-family="monospace" font-size="32" font-weight="bold" fill="#e07a5f">$</text>
  <text x="116" y="170" font-family="monospace" font-size="32" fill="#8b949e">claude session 1</text>

  <!-- Prompt line 2 -->
  <text x="88" y="214" font-family="monospace" font-size="32" font-weight="bold" fill="#e07a5f">$</text>
  <text x="116" y="214" font-family="monospace" font-size="32" fill="#8b949e">claude session 2</text>

  <!-- Prompt line 3 -->
  <text x="88" y="258" font-family="monospace" font-size="32" font-weight="bold" fill="#e07a5f">$</text>
  <text x="116" y="258" font-family="monospace" font-size="32" fill="#8b949e">claude session 3</text>

  <!-- Active cursor -->
  <rect x="88" y="278" width="16" height="28" rx="2" fill="#e07a5f" opacity="0.9"/>

  <!-- Session count badge -->
  <circle cx="408" cy="376" r="36" fill="url(#accent)"/>
  <text x="408" y="386" font-family="sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">3</text>
</svg>
